<section id="budget" class="section">
  <div class="container-fluid px-3 px-sm-4">
    <header class="section-header">
      <h1>Presupuesto Mensual</h1>
    </header>

    <form id="budget-form" class="card">
      <h2>Configurar Presupuesto</h2>
      <div class="row g-3">
        <div class="col-sm-6">
          <div class="form-group">
            <label for="budget-month">Mes</label>
            <input type="month" id="budget-month" required />
          </div>
        </div>
        <div class="col-sm-6">
          <div class="form-group">
            <label for="income-amount">Ingreso Mensual ($)</label>
            <input
              type="number"
              id="income-amount"
              placeholder="0.00"
              min="0"
              step="0.01"
              required
            />
          </div>
        </div>
      </div>
      <h3>Presupuesto por Categoria</h3>
      <div class="row g-3">
        <div class="col-6 col-sm-4"><div class="form-group"><label for="budget-comida">Comida</label><input type="number" id="budget-comida" placeholder="0.00" min="0" step="0.01" /></div></div>
        <div class="col-6 col-sm-4"><div class="form-group"><label for="budget-transporte">Transporte</label><input type="number" id="budget-transporte" placeholder="0.00" min="0" step="0.01" /></div></div>
        <div class="col-6 col-sm-4"><div class="form-group"><label for="budget-ocio">Ocio</label><input type="number" id="budget-ocio" placeholder="0.00" min="0" step="0.01" /></div></div>
        <div class="col-6 col-sm-4"><div class="form-group"><label for="budget-salud">Salud</label><input type="number" id="budget-salud" placeholder="0.00" min="0" step="0.01" /></div></div>
        <div class="col-6 col-sm-4"><div class="form-group"><label for="budget-educacion">Educacion</label><input type="number" id="budget-educacion" placeholder="0.00" min="0" step="0.01" /></div></div>
        <div class="col-6 col-sm-4"><div class="form-group"><label for="budget-hogar">Hogar</label><input type="number" id="budget-hogar" placeholder="0.00" min="0" step="0.01" /></div></div>
        <div class="col-6 col-sm-4"><div class="form-group"><label for="budget-ropa">Ropa</label><input type="number" id="budget-ropa" placeholder="0.00" min="0" step="0.01" /></div></div>
        <div class="col-6 col-sm-4"><div class="form-group"><label for="budget-servicios">Servicios</label><input type="number" id="budget-servicios" placeholder="0.00" min="0" step="0.01" /></div></div>
        <div class="col-6 col-sm-4"><div class="form-group"><label for="budget-otros">Otros</label><input type="number" id="budget-otros" placeholder="0.00" min="0" step="0.01" /></div></div>
      </div>
      <div class="budget-total">
        <span>Total Presupuestado:</span>
        <span id="budget-total-value">$0.00</span>
      </div>
      <div class="budget-remaining">
        <span>Restante del Ingreso:</span>
        <span id="budget-remaining-value">$0.00</span>
      </div>
      <button type="submit" class="btn btn-primary w-100">Guardar Presupuesto</button>
    </form>

    <div class="card">
      <h2>Presupuestos Guardados</h2>
      <div id="budgets-list">
        <p class="empty-state">No hay presupuestos configurados</p>
      </div>
    </div>
  </div>
</section>
